{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>Registro de Usuario</title>
  <link href="{% static 'css/registro.css' %}" rel="stylesheet">
</head>
<body class="bg-gray-100 p-10">
  {% include "partials/navbar.html" %}
  <div class="max-w-lg mx-auto bg-white p-6 rounded shadow">
    <h1 class="text-2xl mb-4 font-bold">Registro de Usuario</h1>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-700">Registrar</button>
    </form>
  </div>
  {% include "partials/footer.html" %}
</body>
</html>
</body>
</html>
